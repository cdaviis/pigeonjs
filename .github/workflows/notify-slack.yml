# Notifies Slack when CI (tests) complete. Posts to #tests with link to the run.
name: CI Slack Notification

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  notify-tests:
    name: Post to #tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install open-message CLI
        run: npm install -g open-message

      - name: Send test run notification to Slack
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CHANNEL_TESTS: ${{ secrets.SLACK_CHANNEL_TESTS }}
        run: |
          open-message send ./templates/ci-tests.yml \
            --var status="${{ github.event.workflow_run.conclusion }}" \
            --var branch="${{ github.event.workflow_run.head_branch }}" \
            --var sha="${{ github.event.workflow_run.head_sha }}" \
            --var workflow="${{ github.event.workflow_run.name }}" \
            --var run_url="${{ github.event.workflow_run.html_url }}"
