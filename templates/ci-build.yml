version: '1'
name: CI Build Notification
description: Slack notification for open-message CI runs

destinations:
  - slack:
      settings:
        channel: '{{SLACK_CHANNEL_TESTS}}'
  - slack:
      settings:
        channel: '{{SLACK_CHANNEL_RELEASES}}'

variables:
  status:
    description: Build status (success, failure)
    required: true
  branch:
    description: Git branch
    required: true
  sha:
    description: Commit SHA
    required: true
  workflow:
    description: Workflow name
    required: true
  run_url:
    description: URL to the workflow run
    required: true

messages:
  blocks:
    - header:
        text: ':bird: open-message CI — {{status}}'
    - section:
        fields:
          - '*Branch:*\n`{{branch}}`'
          - '*Commit:*\n`{{sha}}`'
    - section:
        text: '<{{run_url}}|View workflow run ({{workflow}})>'
    - context:
        - 'Sent at {{now}}'
